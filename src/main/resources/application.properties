spring.application.name=inmobiliaria-app

# ── BASE DE DATOS ────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / HIBERNATE ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# ── THYMELEAF ────────────────────────────────────────────────
spring.thymeleaf.cache=true

# ── SERVIDOR ─────────────────────────────────────────────────
server.port=10000
server.address=0.0.0.0

# ── UPLOADS ──────────────────────────────────────────────────
app.upload.dir=uploads/property-media
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=1GB
spring.servlet.multipart.enabled=true

# ── SESIÓN ───────────────────────────────────────────────────
server.servlet.session.persistent=false
server.servlet.session.timeout=8h

# ── Cloudinary ───────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ── Contacto ─────────────────────────────────────────────────
contact.mail.to=${CONTACT_MAIL_TO}

# ── JavaMailSender ───────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ── Contacto público ─────────────────────────────────────────
app.contact.email=${APP_CONTACT_EMAIL}
app.contact.phone=${APP_CONTACT_PHONE}