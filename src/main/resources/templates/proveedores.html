<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <div th:replace="~{fragments :: head('Proveedores', null)}"></div>
  <link rel="stylesheet" th:href="@{/css/proveedores.css}"/>
</head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<div id="copyToast"></div>

<div class="container">
  <div class="card">

    <!-- CABECERA -->
    <div style="display:flex; align-items:flex-end; justify-content:space-between;
                gap:12px; flex-wrap:wrap; margin-bottom:4px;">
      <div>
        <h2 style="margin-bottom:4px;">Proveedores</h2>
        <div class="small">Personas que nos ofrecen inmuebles para gestionar.</div>
      </div>
      <a class="btn btn-primary" th:href="@{/proveedores/nuevo}"
         style="display:inline-flex; align-items:center; gap:7px;
                font-size:13px; padding:9px 18px; white-space:nowrap;">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nuevo proveedor
      </a>
    </div>

    <hr style="border:none; border-top:1px solid var(--line); margin:14px 0;"/>

    <!-- FILTROS -->
    <form th:action="@{/proveedores}" method="get"
          style="padding:18px 20px; border-radius:14px;
                 border:1px solid var(--line); background:#faf8f4; margin-bottom:16px;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:14px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
             fill="none" stroke="var(--muted)" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
        </svg>
        <span style="font-size:11px; font-weight:700; letter-spacing:1.2px;
                     text-transform:uppercase; color:var(--muted);">Filtros</span>
      </div>
      <div style="display:grid; grid-template-columns:1fr auto; gap:10px; align-items:end;">
        <div>
          <label>Buscar</label>
          <input type="text" name="q" th:value="${q}"
                 placeholder="Nombre, empresa, teléfono, email..." style="margin:0;"/>
        </div>
        <div style="display:flex; gap:8px;">
          <a class="btn btn-secondary" th:href="@{/proveedores}"
             style="font-size:13px; padding:9px 16px;">Limpiar</a>
          <button type="submit"
                  style="display:inline-flex; align-items:center; gap:7px;
                         font-size:13px; padding:9px 20px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
            </svg>
            Filtrar
          </button>
        </div>
      </div>
    </form>

    <!-- Sin resultados -->
    <p th:if="${#lists.isEmpty(suppliers)}"
       style="color:var(--muted); font-size:13px; margin:0; padding:32px 0; text-align:center;">
      No hay proveedores con esos filtros.
    </p>

    <!-- TABLA -->
    <table class="tabla-proveedores" th:if="${!#lists.isEmpty(suppliers)}">
      <thead>
        <tr>
          <th>Proveedor</th>
          <th>Teléfonos</th>
          <th>Emails</th>
          <th style="text-align:center;">Fecha contacto</th>
          <th style="text-align:center;">Inmuebles</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="s : ${suppliers}">

          <!-- NOMBRE -->
          <td>
            <a th:href="@{|/proveedores/${s.id}|}"
               th:text="${s.fullName}"
               style="font-weight:700; text-decoration:none; color:var(--text);
                      font-size:13px; letter-spacing:0.2px;"></a>
            <div th:if="${s.companyName != null and !#strings.isEmpty(s.companyName)}"
                 style="font-size:11px; color:#888; margin-top:2px;"
                 th:text="${s.companyName}"></div>
          </td>

          <!-- TELÉFONOS -->
          <td>
            <span th:if="${#lists.isEmpty(s.phones)}" style="color:#ccc; font-size:13px;">—</span>
            <div th:each="p : ${s.phones}" style="margin-bottom:2px;">
              <a class="wa-link"
                 th:href="${'https://wa.me/' + #strings.replace(#strings.replace(p.phoneNumber,'+',''),' ','')}"
                 target="_blank"
                 th:text="${p.phoneNumber}"
                 onclick="event.stopPropagation()"></a>
            </div>
          </td>

          <!-- EMAILS -->
          <td>
            <span th:if="${#lists.isEmpty(s.emails)}" style="color:#ccc; font-size:13px;">—</span>
            <div th:each="e : ${s.emails}" style="margin-bottom:2px;">
              <span class="copyable"
                    th:attr="data-copy=${e.email}"
                    th:text="${e.email}"
                    style="font-size:12px;"></span>
            </div>
          </td>

          <!-- FECHA CONTACTO -->
          <td style="text-align:center; white-space:nowrap; font-size:12px; color:#666;">
            <span th:if="${s.contactDate != null}"
                  th:text="${#temporals.format(s.contactDate,'dd/MM/yyyy')}"></span>
            <span th:if="${s.contactDate == null}" style="color:#ccc;">—</span>
          </td>

          <!-- INMUEBLES -->
          <td style="text-align:center;">
            <span th:with="cnt=${#lists.size(s.supplierProperties)}"
                  th:class="${cnt > 0 ? 'tag-inmuebles' : 'tag-sin-inmueble'}"
                  th:text="${cnt + (cnt == 1 ? ' inmueble' : ' inmuebles')}">
            </span>
          </td>

          <!-- ACCIÓN -->
          <td style="vertical-align:middle;">
            <a class="btn btn-secondary" th:href="@{|/proveedores/${s.id}|}"
               style="font-size:12px; padding:6px 12px; white-space:nowrap;">Ver ficha →</a>
          </td>

        </tr>
      </tbody>
    </table>

  </div>
</div>

<script th:src="@{/js/proveedores.js}"></script>
</body>
</html>
