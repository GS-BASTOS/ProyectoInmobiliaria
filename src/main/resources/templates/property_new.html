<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Nuevo inmueble', null)}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>

<div class="container">
  <div class="card new-property-card">

    <!-- CABECERA -->
    <div class="new-property-header">
      <div>
        <h2>Nuevo inmueble</h2>
        <div class="small">Rellena los datos del nuevo inmueble.</div>
      </div>
      <a class="btn btn-secondary" th:href="@{/inmuebles}"
         style="font-size:13px; padding:9px 16px; white-space:nowrap;">
        ← Volver al catálogo
      </a>
    </div>

    <hr class="new-property-divider"/>

    <!-- FORMULARIO -->
    <form th:action="@{/inmuebles/nuevo}" th:object="${form}" method="post">

      <div class="form-row-2">
        <div>
          <label>Macro *</label>
          <input th:field="*{propertyCode}" placeholder="Ej: MACRO-001" autofocus/>
          <div class="field-error" th:if="${#fields.hasErrors('propertyCode')}"
               th:errors="*{propertyCode}"></div>
        </div>
        <div>
          <label>Tipo</label>
          <input th:field="*{propertyType}" placeholder="Ej: Piso, Chalet, Local..."/>
        </div>
      </div>

      <div class="form-row-2">
        <div>
          <label>Municipio</label>
          <input th:field="*{municipality}" placeholder="Ej: Madrid"/>
        </div>
        <div>
          <label>Dirección</label>
          <input th:field="*{address}" placeholder="Ej: Calle Gran Vía 1"/>
        </div>
      </div>

      <div>
        <label>Notas internas</label>
        <textarea th:field="*{notes}" rows="3"
                  placeholder="Observaciones internas del equipo..."
                  class="textarea-notes"></textarea>
      </div>

      <div class="form-actions">
        <a class="btn btn-secondary" th:href="@{/inmuebles}"
           style="font-size:13px; padding:10px 20px;">Cancelar</a>
        <button type="submit"
                style="display:inline-flex; align-items:center; gap:7px;
                       font-size:13px; padding:10px 22px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Guardar inmueble
        </button>
      </div>

    </form>
  </div>
</div>

<script th:src="@{/js/property_new.js}"></script>
</body>
</html>
