<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Inmuebles')}"></head>
<style>
  .tabla-inmuebles { width:100%; border-collapse:collapse; font-size:13px; margin-top:4px; }
  .tabla-inmuebles thead tr { border-bottom:2px solid var(--line); }
  .tabla-inmuebles th {
    padding:10px 12px; font-size:11px; font-weight:700; letter-spacing:0.7px;
    text-transform:uppercase; color:var(--muted); white-space:nowrap; text-align:left;
  }
  .tabla-inmuebles td {
    padding:10px 12px; vertical-align:top; border-bottom:1px solid var(--line);
  }
  .tabla-inmuebles tbody tr:last-child td { border-bottom:none; }
  .tabla-inmuebles tbody tr:hover { background:#fafafa; }

  .badge-status {
    display:inline-flex; align-items:center; gap:4px;
    border-radius:999px; padding:3px 9px;
    font-size:11px; font-weight:700; white-space:nowrap;
  }
  .badge-vendido    { background:#e8f5e9; border:1px solid #4caf50; color:#2e7d32; }
  .badge-prevendido { background:#fff4e6; border:1px solid #e07a18; color:#a05800; }
  .badge-disponible { background:#f1f8e9; border:1px solid #8bc34a; color:#558b2f; }

  .section-block {
    padding:18px 20px; border-radius:14px;
    border:1px solid var(--line); background:#faf8f4; margin-bottom:20px;
  }
  .section-block-title {
    font-size:11px; font-weight:700; letter-spacing:1.2px;
    text-transform:uppercase; color:var(--muted); margin-bottom:14px;
    display:flex; align-items:center; gap:6px;
  }
</style>
<body>
<nav th:replace="~{fragments :: nav}"></nav>

<div class="container">
  <div class="card">

    <!-- ══ CABECERA ══ -->
    <div style="display:flex; align-items:flex-end; justify-content:space-between;
                gap:12px; flex-wrap:wrap; margin-bottom:4px;">
      <div>
        <h2 style="margin-bottom:4px;"
            th:text="${editing != null and editing ? 'Editar inmueble' : 'Catálogo de inmuebles'}">
          Inmuebles
        </h2>
        <div class="small">Gestiona el inventario de propiedades del equipo.</div>
      </div>
    </div>

    <hr style="border:none; border-top:1px solid var(--line); margin:14px 0;"/>

    <!-- ══ FORMULARIO AÑADIR / EDITAR ══ -->
    <div class="section-block">
      <div class="section-block-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
             fill="none" stroke="var(--muted)" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        <span th:text="${editing != null and editing ? 'Editando inmueble' : 'Añadir nuevo inmueble'}">
          Añadir nuevo inmueble
        </span>
      </div>

      <form th:action="${editing != null and editing
                          ? '/inmuebles/' + form.id + '/editar'
                          : '/inmuebles'}"
            th:object="${form}" method="post">

        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:12px;">
          <div>
            <label>Macro *</label>
            <input th:field="*{propertyCode}" placeholder="Ej: SOLVIA-001"/>
            <div class="field-error" th:if="${#fields.hasErrors('propertyCode')}"
                 th:errors="*{propertyCode}"></div>
          </div>
          <div>
            <label>Tipo</label>
            <input th:field="*{propertyType}" placeholder="Ej: Piso, Chalet..."/>
          </div>
          <div>
            <label>Municipio</label>
            <input th:field="*{municipality}" placeholder="Ej: Madrid"/>
          </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:0;">
          <div>
            <label>Dirección</label>
            <input th:field="*{address}" placeholder="Ej: Calle Gran Vía 1"/>
          </div>
          <div>
            <label>Notas internas</label>
            <input th:field="*{notes}" placeholder="Notas del equipo..."/>
          </div>
        </div>

        <div style="display:flex; gap:8px; margin-top:14px;">
          <button type="submit"
                  style="display:inline-flex; align-items:center; gap:7px; font-size:13px; padding:9px 20px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
              <polyline points="17 21 17 13 7 13 7 21"/>
              <polyline points="7 3 7 8 15 8"/>
            </svg>
            <span th:text="${editing != null and editing ? 'Actualizar' : 'Añadir inmueble'}">Guardar</span>
          </button>
          <a class="btn btn-secondary" th:href="@{/inmuebles}"
             th:if="${editing != null and editing}"
             style="font-size:13px; padding:9px 16px;">Cancelar</a>
        </div>
      </form>
    </div>

    <!-- ══ FILTROS ══ -->
    <form th:action="@{/inmuebles}" method="get"
          style="padding:18px 20px; border-radius:14px; border:1px solid var(--line);
                 background:#faf8f4; margin-bottom:16px;">

      <div style="display:flex; align-items:center; gap:8px; margin-bottom:14px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
             fill="none" stroke="var(--muted)" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
        </svg>
        <span style="font-size:11px; font-weight:700; letter-spacing:1.2px;
                     text-transform:uppercase; color:var(--muted);">Filtros</span>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; align-items:end; margin-bottom:12px;">
        <div>
          <label>Buscar</label>
          <input type="text" name="q" th:value="${q}"
                 placeholder="Macro, dirección, municipio, tipo..." style="margin:0;"/>
        </div>
        <div>
          <label>Estado</label>
          <select name="soldFilter" style="margin:0;">
            <option value="ALL"         th:selected="${soldFilter == 'ALL'}">Todos</option>
            <option value="ACTIVE"      th:selected="${soldFilter == 'ACTIVE'}">✅ Disponibles</option>
            <option value="PRE_VENDIDO" th:selected="${soldFilter == 'PRE_VENDIDO'}">⏳ Pre vendidos</option>
            <option value="SOLD"        th:selected="${soldFilter == 'SOLD'}">💰 Vendidos</option>
          </select>
        </div>
      </div>

      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <a class="btn btn-secondary" th:href="@{/inmuebles}"
           style="font-size:13px; padding:9px 16px;">Limpiar</a>
        <button type="submit"
                style="display:inline-flex; align-items:center; gap:7px;
                       font-size:13px; padding:9px 20px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
          </svg>
          Filtrar
        </button>
      </div>
    </form>

    <!-- SIN RESULTADOS -->
    <p th:if="${#lists.isEmpty(properties)}"
       style="color:var(--muted); font-size:13px; padding:32px 0;
              text-align:center; margin:0;">
      No hay inmuebles con esos filtros.
    </p>

    <!-- ══ TABLA ══ -->
    <table class="tabla-inmuebles" th:if="${!#lists.isEmpty(properties)}">
      <thead>
        <tr>
          <th style="width:100px; text-align:center;">Estado</th>
          <th>Macro</th>
          <th>Tipo</th>
          <th>Municipio</th>
          <th>Dirección</th>
          <th>Notas</th>
          <th style="text-align:center;">👥 Interesados</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="p : ${properties}"
            th:style="${p.sold ? 'opacity:0.55;' : p.preVendido ? 'opacity:0.82;' : ''}">

          <!-- ESTADO -->
          <td style="text-align:center; vertical-align:middle;">
            <span th:if="${p.sold}" class="badge-status badge-vendido">
              <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2.5"
                   stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              Vendido
            </span>
            <span th:if="${!p.sold and p.preVendido}" class="badge-status badge-prevendido">
              <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2.5"
                   stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
              Pre vendido
            </span>
            <span th:if="${!p.sold and !p.preVendido}" class="badge-status badge-disponible">
              <svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24"
                   fill="#558b2f" stroke="none">
                <circle cx="12" cy="12" r="12"/>
              </svg>
              Disponible
            </span>
          </td>

          <!-- MACRO -->
          <td>
            <a th:href="@{|/inmuebles/${p.id}|}"
               th:text="${p.propertyCode}"
               style="font-weight:800; text-decoration:none; color:var(--text);
                      font-size:13px; letter-spacing:0.3px;">COD</a>
          </td>

          <td style="font-size:12px; color:#555;"
              th:text="${p.propertyType != null ? p.propertyType : '—'}">—</td>
          <td style="font-size:12px;"
              th:text="${p.municipality != null ? p.municipality : '—'}">—</td>
          <td style="font-size:12px; color:#777; max-width:180px;"
              th:text="${p.address != null ? p.address : '—'}">—</td>
          <td style="font-size:11px; color:#aaa; max-width:140px;"
              th:text="${p.notes != null ? p.notes : '—'}">—</td>

          <!-- INTERESADOS -->
          <td style="text-align:center; vertical-align:middle;">
            <span th:with="cnt=${interestCountById.get(p.id) != null ? interestCountById.get(p.id) : 0}"
                  th:text="${cnt}"
                  th:style="${cnt > 0
                               ? 'font-weight:800; color:#0b1f5c; font-size:14px;'
                               : 'color:#ccc; font-size:13px;'}">0</span>
          </td>

          <!-- ACCIONES -->
          <td style="white-space:nowrap; vertical-align:middle;">
            <div style="display:flex; flex-wrap:wrap; gap:6px; align-items:center;">
              <a class="btn btn-secondary" th:href="@{|/inmuebles/${p.id}|}"
                 style="font-size:12px; padding:6px 12px;">Ver ficha →</a>
              <a class="btn btn-secondary" th:href="@{|/inmuebles/${p.id}/editar|}"
                 style="font-size:12px; padding:6px 12px;">Editar</a>

              <button type="button" class="btn-prevendido"
                      th:attr="data-id=${p.id}, data-prevendido=${p.preVendido}"
                      th:text="${p.preVendido ? '↩ Quitar Pre Vendido' : '⏳ Pre Vendido'}"
                      th:style="${p.preVendido
                                  ? 'background:#e07a18; color:#fff; border-color:#e07a18; font-size:12px; padding:6px 12px;'
                                  : 'background:#fff4e6; color:#a05800; border:1px solid #e07a18; font-size:12px; padding:6px 12px;'}">
              </button>

              <button type="button" class="btn-vendido"
                      th:attr="data-id=${p.id}, data-sold=${p.sold}"
                      th:text="${p.sold ? '↩ Disponible' : '💰 Vendido'}"
                      th:style="${p.sold
                                  ? 'background:#4caf50; border-color:#4caf50; font-size:12px; padding:6px 12px;'
                                  : 'background:#b42318; border-color:#b42318; font-size:12px; padding:6px 12px;'}">
              </button>

              <form th:action="@{|/inmuebles/${p.id}/eliminar|}" method="post"
                    onsubmit="return confirm('¿Eliminar este inmueble definitivamente?')"
                    style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit"
                        style="background:#555; border-color:#555; font-size:12px; padding:6px 12px;">
                  Eliminar
                </button>
              </form>
            </div>
          </td>

        </tr>
      </tbody>
    </table>

  </div>
</div>

<script>
(function () {
  const csrfToken  = document.querySelector('meta[name="_csrf"]')?.getAttribute('content') || '';
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content') || 'X-CSRF-TOKEN';

  document.querySelectorAll('.btn-vendido').forEach(btn => {
    btn.addEventListener('click', async function () {
      const id   = btn.getAttribute('data-id');
      const sold = btn.getAttribute('data-sold') === 'true';
      try {
        const res = await fetch(`/inmuebles/${id}/vendido`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            [csrfHeader]: csrfToken
          },
          body: 'sold=' + encodeURIComponent(String(!sold))
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        window.location.reload();
      } catch (e) { alert('No se pudo actualizar el estado.'); }
    });
  });

  document.querySelectorAll('.btn-prevendido').forEach(btn => {
    btn.addEventListener('click', async function () {
      const id         = btn.getAttribute('data-id');
      const preVendido = btn.getAttribute('data-prevendido') === 'true';
      try {
        const res = await fetch(`/inmuebles/${id}/prevendido`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            [csrfHeader]: csrfToken
          },
          body: 'preVendido=' + encodeURIComponent(String(!preVendido))
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        window.location.reload();
      } catch (e) { alert('No se pudo actualizar el estado.'); }
    });
  });
})();
</script>
</body>
</html>
